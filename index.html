<!DOCTYPE html>
<html>
<head>
<title>ShreeShyam Stock AI</title>

<style>
body{
background:#0b1736;
color:white;
font-family:Arial;
text-align:center;
padding-top:100px;
}

input{
padding:10px;
width:250px;
}

button{
padding:10px 20px;
background:#4CAF50;
border:none;
color:white;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:18px;
}
</style>

</head>

<body>

<h1>ShreeShyam Stock AI</h1>

<input id="stock" placeholder="Enter stock name">

<button onclick="analyzeStock()">Analyze</button>

<div id="result"></div>

<script>

async function analyzeStock(){

const stock=document.getElementById("stock").value;

document.getElementById("result").innerText="Analyzing...";

const res=await fetch("/api/analyze?stock="+stock);

const data=await res.json();

document.getElementById("result").innerText=data.result;

}

</script>

</body>
</html>
